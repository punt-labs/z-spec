# bd 1.0.x server-mode config for this repo.
#
# Connection details (host, port, user, password, TLS) come from
# environment variables set by the org-root .envrc plus the central
# config at ~/.config/beads/server.json. They are NOT stored here so
# the same .beads/ works on every machine and across credential
# rotations.
#
# Issue prefix lives in .beads/metadata.json (alongside dolt_mode and
# dolt_database) so it travels with the repo.
#
# This file is intentionally minimal. Most legacy keys (no-db, no-daemon,
# no-auto-flush, no-auto-import, sync-branch) were removed in bd 1.0+
# and reading them would be misleading.
